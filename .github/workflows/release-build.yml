name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build release APK via Docker
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          docker build \
            --build-arg BUILD_TYPE=release \
            --build-arg VERSION=${{ env.VERSION }} \
            --secret id=keystore,src=./release.keystore \
            --secret id=store_password,env=RELEASE_STORE_PASSWORD \
            --secret id=key_alias,env=RELEASE_KEY_ALIAS \
            --secret id=key_password,env=RELEASE_KEY_PASSWORD \
            --output type=local,dest=out \
            .

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
